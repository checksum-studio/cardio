name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      frontend: ${{ steps.filter.outputs.frontend }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'src-tauri/**'
              - 'Cargo.lock'
            frontend:
              - 'src/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'vite.config.ts'
              - 'tsconfig.json'
            ci:
              - '.github/workflows/ci.yml'
              - 'release-please-config.json'
              - '.release-please-manifest.json'

  check:
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install Rust
        if: needs.changes.outputs.rust == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust
        if: needs.changes.outputs.rust == 'true'
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux dependencies
        if: needs.changes.outputs.rust == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm build

      - name: Check Rust formatting
        if: needs.changes.outputs.rust == 'true'
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Clippy
        if: needs.changes.outputs.rust == 'true'
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: Test Rust
        if: needs.changes.outputs.rust == 'true'
        run: cargo test --manifest-path src-tauri/Cargo.toml

  check-macos:
    needs: [changes, check]
    if: needs.changes.outputs.rust == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            src-tauri
            Cargo.lock

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: macos

      - name: Create mock frontend dist
        run: mkdir -p dist && echo '<!DOCTYPE html><html><body></body></html>' > dist/index.html

      - name: Check aarch64
        run: cargo check --manifest-path src-tauri/Cargo.toml --target aarch64-apple-darwin

      - name: Check x86_64
        run: cargo check --manifest-path src-tauri/Cargo.toml --target x86_64-apple-darwin

  check-windows:
    needs: [changes, check]
    if: needs.changes.outputs.rust == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            src-tauri
            Cargo.lock

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: windows

      - name: Create mock frontend dist
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Set-Content -Path dist/index.html -Value '<!DOCTYPE html><html><body></body></html>'

      - name: Check compilation
        run: cargo check --manifest-path src-tauri/Cargo.toml

  check-android:
    needs: [changes, check]
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            src-tauri
            Cargo.lock

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: android

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: >
            ndk;29.0.13846066
            platforms;android-36

      - name: Create mock frontend dist
        run: mkdir -p dist && echo '<!DOCTYPE html><html><body></body></html>' > dist/index.html

      - name: Check compilation
        working-directory: src-tauri
        run: |
          export NDK_HOME="${ANDROID_HOME}/ndk/29.0.13846066"
          export TOOLCHAIN="${NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          export CC_aarch64_linux_android="${TOOLCHAIN}/aarch64-linux-android24-clang"
          export CXX_aarch64_linux_android="${TOOLCHAIN}/aarch64-linux-android24-clang++"
          export AR_aarch64_linux_android="${TOOLCHAIN}/llvm-ar"
          export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER="${TOOLCHAIN}/aarch64-linux-android24-clang"
          cargo check --target aarch64-linux-android

  check-ios:
    needs: [changes, check]
    if: needs.changes.outputs.rust == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            src-tauri
            Cargo.lock

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: ios

      - name: Create mock frontend dist
        run: mkdir -p dist && echo '<!DOCTYPE html><html><body></body></html>' > dist/index.html

      - name: Check compilation
        run: cargo check --manifest-path src-tauri/Cargo.toml --target aarch64-apple-ios
